services:
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    depends_on: [db, redis]
    volumes:
      - ./amnezia_control:/app
    expose:
      - "8000"
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on: [db, redis]
    volumes:
      - ./amnezia_control:/app
  caddy:
    image: caddy:2
    depends_on: [web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
