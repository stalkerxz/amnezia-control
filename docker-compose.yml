services:
  db:
    restart: unless-stopped
    image: postgres:16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./amnezia_control:/app
      - media_data:/data/media
    ports:
      - "127.0.0.1:${APP_PORT:-8090}:8000"

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./amnezia_control:/app
      - media_data:/data/media
    command: ["bash", "-lc", "python manage.py wait_for_db && celery -A amnezia_control worker -l INFO"]

  beat:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./amnezia_control:/app
      - media_data:/data/media
    command: ["bash", "-lc", "python manage.py wait_for_db && celery -A amnezia_control beat -l INFO"]

volumes:
  postgres_data:
  media_data:
