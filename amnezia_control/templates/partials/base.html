{% load static %}
<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>amnezia-control</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="app-shell">
{% if user.is_authenticated %}
<div class="d-flex">
  <aside class="sidebar p-3">
    <a class="brand d-block mb-4" href="/">amnezia-control</a>
    <div class="sidebar-caption mb-2">Операторская консоль</div>
    <nav class="nav flex-column gap-1">
      <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Дашборд</a>
      <a class="nav-link {% if '/servers/' in request.path %}active{% endif %}" href="/servers/">Серверы</a>
      <a class="nav-link {% if '/clients/' in request.path %}active{% endif %}" href="/clients/">Клиенты</a>
      <a class="nav-link {% if '/jobs/' in request.path %}active{% endif %}" href="/jobs/">Задания</a>
      <a class="nav-link {% if '/audit/' in request.path %}active{% endif %}" href="/audit/">Аудит</a>
      <hr>
      <a class="nav-link text-secondary" href="/admin/">Django Admin (тех.)</a>
      <a class="nav-link text-danger" href="/logout/">Выход</a>
    </nav>
  </aside>
  <main class="content flex-grow-1 p-4 p-xl-5">
    {% for message in messages %}
      <div class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% else %}alert-info{% endif %} alert-dismissible fade show mb-3" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
{% else %}
  <main class="container py-4">
{% endif %}

    {% block content %}{% endblock %}
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
