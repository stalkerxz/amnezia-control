{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>amnezia-control</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">amnezia-control</a>
    {% if user.is_authenticated %}
    <div class="navbar-nav">
      <a class="nav-link" href="/servers/">Серверы</a>
      <a class="nav-link" href="/clients/">Клиенты</a>
      <a class="nav-link" href="/audit/">Аудит</a>
      <a class="nav-link" href="/jobs/">Задания</a>
      <a class="nav-link" href="/admin/">Django Admin</a>
      <a class="nav-link" href="/logout/">Выход</a>
    </div>
    {% endif %}
  </div>
</nav>
<main class="container py-4">
  {% for message in messages %}
  <div class="alert alert-info">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
