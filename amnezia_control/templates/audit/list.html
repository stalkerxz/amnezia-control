{% extends 'partials/base.html' %}
{% block content %}
<h1 class="h3">Журнал аудита</h1>
<form class="my-3"><input class="form-control" name="q" value="{{ q }}" placeholder="Фильтр по действию"></form>
<table class="table table-sm table-striped"><tr><th>Дата</th><th>Пользователь</th><th>Действие</th><th>Сущность</th><th>Детали</th></tr>
{% for l in logs %}<tr><td>{{ l.created_at }}</td><td>{{ l.actor }}</td><td>{{ l.action }}</td><td>{{ l.entity_type }}:{{ l.entity_id }}</td><td><code>{{ l.details }}</code></td></tr>{% endfor %}
</table>
{% endblock %}
